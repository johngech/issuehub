name: issue-tracker

services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: issue-tracker-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-issuehub}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-issuehub}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  # ──────────────────────────────────────────────
  # API Server (Express + Bun)
  # ──────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: deps
    container_name: issue-tracker-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:changeme@postgres:5432/issuehub?schema=public}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-in-production}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      PORT: ${PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:4000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app/server
      - ./core:/app/core
      - ./node_modules:/app/node_modules
    command: >
      sh -c "
        cd /app/server &&
        bunx prisma generate &&
        bunx prisma db push --accept-data-loss &&
        bun run --watch index.ts
      "
    networks:
      - app-network

  # ──────────────────────────────────────────────
  # Client (React + Vite)
  # ──────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: builder
    container_name: issue-tracker-client
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:5173').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - ./core:/app/core
      - ./node_modules:/app/node_modules
    command: >
      sh -c "
        cd /app/client &&
        bunx vite dev --host 0.0.0.0 --port 5173
      "
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
