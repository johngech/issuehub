name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Lint & Type Check
  # ──────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [client, server, core]
      fail-fast: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (${{ matrix.package }})
        working-directory: ${{ matrix.package }}
        run: bunx biome check src/

      - name: Type check (${{ matrix.package }})
        if: matrix.package != 'core'
        working-directory: ${{ matrix.package }}
        run: bunx tsc --noEmit

  # ──────────────────────────────────────────────
  # Tests
  # ──────────────────────────────────────────────
  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [client]
      fail-fast: false
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests (${{ matrix.package }})
        working-directory: ${{ matrix.package }}
        run: bunx vitest run

  # ──────────────────────────────────────────────
  # Docker Build
  # ──────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: false
          load: true
          tags: issue-tracker-server:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build Client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: false
          load: true
          tags: issue-tracker-client:latest
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max

  # ──────────────────────────────────────────────
  # Push to GHCR (main branch only)
  # ──────────────────────────────────────────────
  push-docker:
    name: Push Docker Images to GHCR
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest

      - name: Build & push Server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-server:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

      - name: Build & push Client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-client:${{ steps.meta.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,scope=client,mode=max
